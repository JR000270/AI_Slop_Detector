<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slop-Detector</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header__logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="10" cy="10" r="9" stroke="#8C5E4A" stroke-width="2" />
        <circle cx="10" cy="10" r="4" fill="#8C5E4A" />
        <line x1="16" y1="16" x2="18.5" y2="18.5" stroke="#8C5E4A" stroke-width="2" stroke-linecap="round" />
      </svg>
      Slop-Detector
    </div>
    <span id="connection-dot" class="dot dot--unknown" title="OpenClaw status unknown"></span>
  </header>

  <!-- ── Tab bar ────────────────────────────────────────────────────────── -->
  <nav class="tabs" role="tablist">
    <button class="tab tab--active" data-tab="scan" role="tab" aria-selected="true">Image Check</button>
    <button class="tab" data-tab="video" role="tab">Video Check</button>
    <button class="tab" data-tab="settings" role="tab">Settings</button>
  </nav>

  <!-- ── Scan tab ───────────────────────────────────────────────────────── -->
  <section class="tab-panel" id="tab-scan" role="tabpanel">
    <!-- Result area -->
    <div id="result-area">

      <!-- Empty state -->
      <div id="state-empty" class="state">
        <div class="empty-icon" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="16" cy="16" r="12" stroke="#CBD5E1" stroke-width="2.5" />
            <circle cx="16" cy="16" r="5" fill="#CBD5E1" />
            <line x1="25" y1="25" x2="30" y2="30" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" />
          </svg>
        </div>
        <p class="empty-title">Nothing scanned yet</p>
        <p class="empty-sub">Right-click an image or video and choose<br><em>Verify With Slop-Detector</em></p>
      </div>

      <!-- Loading / shimmer state -->
      <div id="state-loading" class="state" hidden>
        <div class="shimmer shimmer--gauge"></div>
        <div class="shimmer shimmer--label"></div>
        <div class="shimmer shimmer--url"></div>
      </div>

      <!-- Preview-only state (no scan result yet) -->
      <div id="state-preview" class="state" hidden>
        <div class="result-preview-wrap">
          <img id="preview-only-img" class="result-preview" alt="Selected image" hidden />
          <video id="preview-only-vid" class="result-preview" muted playsinline hidden></video>
        </div>
        <p id="preview-only-url" class="result-url"></p>
        <br>
        <div style="display:flex;gap:8px;">
          <button id="btn-analyze-upload" class="btn btn--primary" disabled>Analyze</button>
          <button id="btn-clear-result" class="btn">Clear</button>
        </div>
      </div>

      <!-- Result state -->
      <div id="state-result" class="state" hidden>
        <!-- Thumbnail preview -->
        <div class="result-preview-wrap">
          <img id="result-preview-img" class="result-preview" alt="Scanned image" hidden />
          <video id="result-preview-vid" class="result-preview" muted playsinline hidden></video>
        </div>
        <!-- Gauge -->
        <div class="gauge-wrap">
          <svg viewBox="0 0 200 110" width="200" height="110" aria-hidden="true">
            <!-- Track -->
            <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#E2E8F0" stroke-width="16"
              stroke-linecap="round" />
            <!-- Value arc – stroke-dashoffset set by JS -->
            <path id="gauge-arc" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#8C5E4A" stroke-width="16"
              stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2" />
          </svg>
          <div class="gauge-pct-wrap">
            <span id="gauge-pct" class="gauge-pct">--%</span>
            <span id="gauge-label" class="gauge-label"></span>
          </div>
        </div>
        <p id="result-url" class="result-url"></p>
        <p id="result-source" class="result-source"></p>
        <button id="btn-clear-result-scan" class="btn btn--ghost btn--sm btn--danger"
          style="margin-top:8px">Clear</button>
      </div>

    </div><!-- /result-area -->

    <hr class="divider" />

    <!-- Single pick -->
    <div class="section">
      <button id="btn-pick" class="btn btn--primary btn--full">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5" />
          <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="6" y1="2" x2="6" y2="0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="6" y1="12" x2="6" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="2" y1="6" x2="0" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="12" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        Grab Image from page
      </button>
    </div>

    <div class="section">
      <button id="btn-upload" class="btn btn--primary btn--full">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1v8M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M1 10v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" />
        </svg>
        Upload from device
      </button>
      <input id="file-input" type="file" accept="image/*,video/*" style="display:none" />
    </div>



    <hr class="divider" />

    <!-- Batch scan -->
    <div class="section">
      <button id="btn-batch" class="btn btn--secondary btn--full">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5" />
          <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5" />
          <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5" />
          <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5" />
        </svg>
        Scan All Images on Page
      </button>
      <!-- Batch progress (hidden until running) -->
      <div id="batch-progress" hidden>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-label" class="progress-label">Scanning…</p>
      </div>
      <!--<p id = "domain-trust" hidden style="margin:8px 0 0 0; font-size:12px; text-align:center; display:flex; gap:6px; justify-content:center; align-items:center;"></p>-->
    </div>

    <hr class="divider" />


  </section>

  <!-- ── Video Check tab ───────────────────────────────────────────────── -->
  <section class="tab-panel" id="tab-video" role="tabpanel" hidden>

    <div class="section">
      <label class="label" for="video-url-input">Video URL</label>
      <input id="video-url-input" class="input" type="url" placeholder="https://…" />
    </div>

    <div class="or-divider"><span>or</span></div>

    <div class="section">
      <button id="btn-upload-video" class="btn btn--secondary btn--full">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1v8M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M1 10v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" />
        </svg>
        Upload video from device
      </button>
      <input id="video-file-input" type="file" accept="video/*" style="display:none" />
    </div>

    <div class="section">
      <button id="btn-analyze-video" class="btn btn--primary btn--full" disabled>Analyze Video</button>
    </div>

    <hr class="divider" />

    <!-- Result area -->
    <div id="video-state-empty" class="state">
      <p class="empty-title">No video analyzed yet</p>
      <p class="empty-sub">Enter a URL or upload a video above.</p>
    </div>

    <div id="video-state-loading" class="state" hidden>
      <div class="shimmer shimmer--label" style="width:85%;margin-bottom:8px"></div>
      <div class="shimmer shimmer--label" style="width:100%;margin-bottom:6px"></div>
      <div class="shimmer shimmer--label" style="width:70%"></div>
    </div>

    <div id="video-state-result" class="state" hidden>
      <!-- Gemini analysis text -->
      <p id="video-analysis-text" style="font-size:13px;text-align:center;padding:8px 0;font-weight:500;color:#334155;"
        hidden></p>
      <!-- AI detection row (shown when available) -->
      <div id="video-detection-row" class="video-detection-row" hidden>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4" />
          <path d="M4 6l1.5 1.5L8.5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        <span class="video-detection-label">AI Detection</span>
        <span id="video-detection-badge" class="verdict-badge"></span>
        <span id="video-detection-score" class="video-detection-score"></span>
      </div>
      <!-- Fact-check card -->
      <div id="video-factcheck-wrap">
        <div class="factcheck-card">
          <div class="factcheck-header">
            <div class="factcheck-icon" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1L1.5 3.5V7c0 3 2.5 5 5.5 5.5C10 12 12.5 10 12.5 7V3.5L7 1z" stroke="currentColor"
                  stroke-width="1.4" stroke-linejoin="round" />
                <path d="M4.5 7l1.8 1.8L9.5 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <span class="factcheck-title">Fact Check</span>
            <span id="video-verdict-badge" class="verdict-badge" hidden></span>
          </div>
          <div class="factcheck-divider"></div>
          <div class="factcheck-body" id="video-analysis-body"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <p id="video-result-source" class="result-url" style="margin-top:0"></p>
        <button id="btn-clear-video" class="btn btn--ghost btn--sm btn--danger">Clear</button>
      </div>
    </div>

    <div id="video-state-toolong" class="state" hidden>
      <div class="toolong-card">
        <p id="video-toolong-text" class="toolong-text"></p>
        <a id="btn-download-clip" class="btn btn--secondary btn--full" href="#" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M7 1v8M4 10l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M1 11v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" />
          </svg>
          Download Clip
        </a>
        <button id="btn-clear-toolong" class="btn btn--ghost btn--sm" style="margin-top:6px;width:100%">Back</button>
      </div>
    </div>

    <div id="video-state-error" class="state" hidden>
      <p id="video-error-text" class="feedback feedback--error" style="text-align:center"></p>
    </div>

  </section>


  <!-- ── Settings tab ────────────────────────────────────────────────────── -->
  <section class="tab-panel" id="tab-settings" role="tabpanel" hidden>

    <div class="section">
      <label class="label" for="api-key-input">AI-or-Not API Key</label>
      <div class="input-row">
        <input id="api-key-input" class="input" type="password" placeholder="sk-…" autocomplete="off"
          spellcheck="false" />
        <button id="btn-save-key" class="btn btn--secondary">Save</button>
      </div>
    </div>

    <div class="section">
      <label class="label" for="endpoint-input">OpenClaw Endpoint</label>
      <div class="input-row">
        <input id="endpoint-input" class="input" type="url" placeholder="http://localhost:3000/api/truthlens" />
        <button id="btn-save-endpoint" class="btn btn--secondary">Save</button>
      </div>
    </div>

    <div class="section">
      <div class="row row--between row--vcenter">
        <span class="label">OpenClaw Status</span>
        <div class="status-chip" id="status-chip">
          <span id="status-dot" class="dot dot--unknown"></span>
          <span id="status-text">Checking…</span>
        </div>
      </div>
      <button id="btn-recheck" class="btn btn--ghost btn--sm">Re-check connection</button>
    </div>

    <div class="section">
      <div class="row row--between row--vcenter">
        <span class="label">Cache</span>
        <button id="btn-clear-cache" class="btn btn--ghost btn--sm btn--danger">Clear Cache</button>
      </div>
      <p id="cache-feedback" class="feedback" hidden></p>
    </div>

    <!-- Proactive scan -->
    <div class="section">
      <div class="row row--between">
        <label class="label" for="toggle-proactive">Auto-scan on page load</label>
        <button id="toggle-proactive" class="toggle" role="switch" aria-checked="false">
          <span class="toggle__thumb"></span>
        </button>
      </div>
      <div class="row row--between" id="sensitivity-row">
        <label class="label label--muted" for="sensitivity-select">Sensitivity</label>
        <select id="sensitivity-select" class="select">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>



  </section>

  <script src="popup.js"></script>
</body>

</html>
